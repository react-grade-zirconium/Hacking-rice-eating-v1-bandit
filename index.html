<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bandit Wargame Simulator — Level 13~20</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,700;1,400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #07090c;
  --surface:  #0d1017;
  --border:   #171e28;
  --green:    #39ff7e;
  --green2:   #00c853;
  --amber:    #ffc107;
  --red:      #ff3d57;
  --blue:     #2979ff;
  --cyan:     #00e5ff;
  --text:     #b0bec5;
  --muted:    #37474f;
  --good-bg:  rgba(57,255,126,0.07);
  --bad-bg:   rgba(255,193,7,0.07);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  display:flex;
  flex-direction:column;
}

/* scanlines */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.04) 3px,rgba(0,0,0,0.04) 4px);
}

/* ── HEADER ── */
header{
  display:flex;align-items:center;gap:16px;
  padding:0 24px;height:52px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.logo{
  font-family:'Bebas Neue',sans-serif;
  font-size:24px;letter-spacing:3px;
  color:var(--green);
}
.logo em{color:var(--amber);font-style:normal;}
.tagline{font-size:10px;color:var(--muted);letter-spacing:1px;}
.hdr-right{margin-left:auto;display:flex;gap:20px;font-size:10px;color:var(--muted);letter-spacing:1px;}
.hdr-right span b{color:var(--cyan);}

/* progress */
.pbar{height:2px;background:var(--border);flex-shrink:0;}
.pfill{height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .5s cubic-bezier(.4,0,.2,1);}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
.sidebar{
  width:200px;flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--border);
  overflow-y:auto;padding:12px 0;
}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--border);}
.sb-title{padding:0 16px 10px;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.sb-item{
  padding:10px 16px;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  border-left:2px solid transparent;
  transition:all .12s;
}
.sb-item:hover{background:rgba(57,255,126,0.03);}
.sb-item.active{border-left-color:var(--green);background:rgba(57,255,126,0.05);}
.sb-item.done .sb-icon{color:var(--green);}
.sb-item.active .sb-num{color:var(--green);}
.sb-icon{font-size:11px;color:var(--muted);width:14px;text-align:center;flex-shrink:0;}
.sb-num{font-size:12px;font-weight:700;color:var(--text);}
.sb-tag{font-size:9px;color:var(--muted);margin-top:1px;letter-spacing:.5px;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

/* level info */
.lvinfo{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 22px;flex-shrink:0;
}
.lvtitle{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:2px;color:var(--green);
  display:flex;align-items:center;gap:10px;margin-bottom:6px;
}
.badge{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;font-weight:700;letter-spacing:1.5px;padding:3px 8px;border-radius:2px;
  background:rgba(57,255,126,0.1);border:1px solid rgba(57,255,126,0.25);color:var(--green);
}
.lvgoal{font-size:12px;color:var(--text);line-height:1.65;margin-bottom:8px;}
.lvhint{
  font-size:11px;color:var(--blue);
  background:rgba(41,121,255,0.06);
  border:1px solid rgba(41,121,255,0.18);
  border-radius:3px;padding:8px 12px;line-height:1.7;
}
.lvhint b{color:var(--cyan);}

/* terminal */
.term{flex:1;overflow-y:auto;padding:16px 22px;cursor:text;}
.term::-webkit-scrollbar{width:3px;}
.term::-webkit-scrollbar-thumb{background:var(--border);}

.line{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;line-height:1.85;
  white-space:pre-wrap;word-break:break-all;
}
.line.cmd{color:var(--green);}
.line.cmd::before{content:'$ ';color:var(--amber);}
.line.out{color:var(--text);}
.line.err{color:var(--red);}
.line.info{color:var(--cyan);}
.line.sys{color:var(--muted);font-style:italic;}
.line.mt{color:var(--muted);}
.line.good{
  color:var(--green);
  background:var(--good-bg);
  border-left:2px solid var(--green);
  padding:6px 10px;margin:3px 0;border-radius:0 3px 3px 0;
}
.line.bad{
  color:var(--amber);
  background:var(--bad-bg);
  border-left:2px solid var(--amber);
  padding:6px 10px;margin:3px 0;border-radius:0 3px 3px 0;
}

/* input row */
.inputrow{
  background:var(--surface);border-top:1px solid var(--border);
  padding:11px 22px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.prompt{color:var(--amber);font-size:13px;white-space:nowrap;flex-shrink:0;}
#cmd{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--green);font-family:'JetBrains Mono',monospace;font-size:13px;
  caret-color:var(--green);
}
#cmd::placeholder{color:var(--muted);}
.btn{
  background:rgba(57,255,126,0.08);
  border:1px solid rgba(57,255,126,0.25);
  color:var(--green);padding:5px 12px;
  font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:1px;
  cursor:pointer;border-radius:3px;transition:all .12s;flex-shrink:0;
}
.btn:hover{background:rgba(57,255,126,0.16);border-color:var(--green);}
.btn.sec{
  background:transparent;border-color:var(--border);color:var(--muted);
}
.btn.sec:hover{color:var(--text);border-color:var(--muted);}

/* mobile tweaks */
@media(max-width:640px){
  .sidebar{width:52px;}
  .sb-num,.sb-tag,.sb-title{display:none;}
  .sb-item{justify-content:center;padding:10px 0;}
  .lvinfo{padding:10px 14px;}
  .term{padding:12px 14px;}
  .inputrow{padding:9px 14px;}
  .line{font-size:12px;}
}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.line{animation:fadeIn .12s ease both;}
</style>
</head>
<body>

<header>
  <div class="logo">BANDIT<em>SIM</em></div>
  <div class="tagline">OVERTHEWIRE · LV 13–20</div>
  <div class="hdr-right">
    <span>LEVEL <b id="h-lv">13</b></span>
    <span>DONE <b id="h-prog">0/8</b></span>
  </div>
</header>
<div class="pbar"><div class="pfill" id="pfill" style="width:0"></div></div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="lvinfo">
      <div class="lvtitle"><span id="l-title"></span><span class="badge" id="l-badge"></span></div>
      <div class="lvgoal" id="l-goal"></div>
      <div class="lvhint" id="l-hint"></div>
    </div>
    <div class="term" id="term" onclick="document.getElementById('cmd').focus()"></div>
    <div class="inputrow">
      <span class="prompt" id="l-prompt">bandit13@bandit:~$</span>
      <input id="cmd" type="text" placeholder="명령어 입력..." autocomplete="off" spellcheck="false">
      <button class="btn sec" onclick="clearTerm()">CLR</button>
      <button class="btn" onclick="submit()">ENTER ↵</button>
    </div>
  </div>
</div>

   ],
   wrong:{"ssh bandit18@localhost":"❌ .bashrc가 바로 로그아웃! -T 옵션 추가: ssh -T bandit18@localhost","cat readme":"❌ bandit18로 로그인된 상태가 아닙니다.","su bandit18":"❌ su 사용 불가.","sudo":"❌ sudo 권한 없음."}},

   goal:"setuid 바이너리 bandit20-do를 사용해 bandit20 권한으로 비밀번호를 읽으세요.",

     o:"[1] 25823\n포트 33333 대기 중...",fb:{ok:1,msg:"✓ nc 리스닝 서버 백그라운드 실행 중! ./suconnect 33333 을 실행하세요."}},
    {m:["./suconnect 33333"],o:"Read: GbKksEFF4yrVs6il55v6gwY5aVje5f0j\nPassword matches, sending next password\ngE269g2h3mw3pwgrj0Ha9Uoqen1c9DGr",fb:{ok:1,msg:"🏆 전체 클리어! 8단계 완료! 대단합니다!"},done:1},

];

let cur=0, stepMap={}, done=new Set(), hist=[], histIdx=-1;
LEVELS.forEach(l=>stepMap[l.id]=0);

function $(id){return document.getElementById(id);}

function renderSidebar(){
  const sb=$('sidebar');
  sb.innerHTML='<div class="sb-title">LEVELS</div>';
  LEVELS.forEach((l,i)=>{
    const d=document.createElement('div');
    d.className='sb-item'+(i===cur?' active':'')+(done.has(l.id)?' done':'');
    d.onclick=()=>go(i);
    d.innerHTML=`<span class="sb-icon">${done.has(l.id)?'✓':i===cur?'▶':'○'}</span>
      <div><div class="sb-num">Lv ${l.id}</div><div class="sb-tag">${l.badge}</div></div>`;
    sb.appendChild(d);
  });
}

function renderHeader(){
  const l=LEVELS[cur];
  $('l-title').textContent=l.title;
  $('l-badge').textContent=l.badge;
  $('l-goal').textContent=l.goal;
  $('l-hint').innerHTML='💡 '+l.hint;
  $('l-prompt').textContent=l.user+'@bandit:~$';
  $('h-lv').textContent=l.id;
  $('h-prog').textContent=done.size+'/8';
  $('pfill').style.width=(done.size/8*100)+'%';
}

function addLine(cls,txt){
  const t=$('term');
  txt.split('\n').forEach(v=>{
    const d=document.createElement('div');
    d.className='line '+cls;
    d.textContent=v;
    t.appendChild(d);
  });
  t.scrollTop=t.scrollHeight;
}

function clearTerm(){$('term').innerHTML='';}

function go(idx){
  cur=idx;
  clearTerm();
  const l=LEVELS[cur];
  addLine('sys','Level '+l.id+' 로드됨');
  addLine('sys',l.goal);
  addLine('mt','');
  if(done.has(l.id)) addLine('good','✓ 이미 완료한 레벨입니다. 복습하거나 다음으로 이동하세요.');
  renderSidebar();
  renderHeader();
  $('cmd').focus();
}

function submit(){
  const raw=$('cmd').value.trim();
  $('cmd').value='';
  if(!raw)return;
  hist.unshift(raw); histIdx=-1;
  addLine('cmd',raw);

  if(raw==='clear'){clearTerm();return;}
  if(raw==='help'||raw==='hint'){
    const l=LEVELS[cur];
    const d=document.createElement('div');
    d.className='line bad';
    d.innerHTML='💡 '+l.hint;
    $('term').appendChild(d);
    $('term').scrollTop=$('term').scrollHeight;
    return;
  }
  if(raw==='next'){
    if(done.has(LEVELS[cur].id)&&cur<LEVELS.length-1) go(cur+1);
    else if(!done.has(LEVELS[cur].id)) addLine('bad','⚠ 먼저 이 레벨을 클리어하세요!');
    return;
  }
  if(raw==='whoami'){addLine('out',LEVELS[cur].user);return;}
  if(raw==='pwd'){addLine('out','/home/'+LEVELS[cur].user);return;}
  if(raw==='id'){const uid=11000+LEVELS[cur].id;addLine('out','uid='+uid+'('+LEVELS[cur].user+') gid='+uid+'('+LEVELS[cur].user+')');return;}

  const l=LEVELS[cur];
  // wrong
  let wMsg=null;
  for(const[pat,msg] of Object.entries(l.wrong||{})){
    if(raw.includes(pat)){wMsg=msg;break;}
  }

  // steps
  let matched=false;
  for(let i=0;i<l.steps.length;i++){
    const s=l.steps[i];
    if(s.m.some(m=>raw===m)){
      if(s.o) addLine('out',s.o);
      if(s.fb){
        addLine(s.fb.ok?'good':'bad',s.fb.msg);
      }
      if(s.done){
        done.add(l.id);
        stepMap[l.id]=0;
        renderSidebar();
        renderHeader();
        setTimeout(()=>{
          if(cur<LEVELS.length-1) addLine('info','→ "next" 를 입력하면 다음 레벨로 이동합니다.');
          else addLine('good','🏆 모든 레벨 완료! 축하합니다!');
        },200);
      } else {
        stepMap[l.id]=Math.max(stepMap[l.id],i)+1;
      }
      matched=true;
      break;
    }
  }

  if(!matched){
    if(wMsg){addLine('bad',wMsg);}
    else{
      addLine('err','bash: '+raw.split(' ')[0]+': command not found');
      addLine('bad',"⚠ 'hint' 를 입력하면 힌트를 볼 수 있습니다.");
    }
  }
}

$('cmd').addEventListener('keydown',e=>{
  if(e.key==='Enter'){submit();return;}
  if(e.key==='ArrowUp'){
    e.preventDefault();
    const ni=Math.min(histIdx+1,hist.length-1);
    histIdx=ni; $('cmd').value=hist[ni]||'';
  }
  if(e.key==='ArrowDown'){
    e.preventDefault();
    histIdx=histIdx-1;
    if(histIdx<0){histIdx=-1;$('cmd').value='';}
    else $('cmd').value=hist[histIdx]||'';
  }
});

// init
renderSidebar();
renderHeader();
addLine('sys','OverTheWire Bandit Simulator — Level 13~20');
addLine('sys',"'help' 힌트  |  'hint' 단계별 힌트  |  'next' 다음 레벨 이동");
addLine('mt','');
addLine('info','▶ Level 13 → 14 시작! ls 로 시작해보세요.');
$('cmd').focus();
</script>
